<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>子不语博客</title>
  <style>
    .title {
      font-size: 40px;
      font-weight: 600;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .title span {
      background: linear-gradient(to right, #538dcb, #cb1ccb) no-repeat right bottom;
      background-size: 0 2px;
      transition: background-size 3000ms;
    }

    .title span:hover {
      background-position-x: left;
      background-size: 100% 2px;
    }

    .box {
      width: 100%;
      height: 2000px;
      background-color: bisque;

    }

    .test {
      position: fixed;
      right: 20px;
      bottom: 10px;
    }
  </style>
</head>

<body>


  <div class="box">
    <div class="test">我是一段文本</div>
  </div>

  <div class="title">
    <span>我是一段很长的文本</span>
  </div>
</body>

</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="思维兵工厂">
  <!-- 朱砂方印（方向A·子曰·墨） -->
  <rect x="3" y="3" width="94" height="94" rx="21" fill="#C8453B"/>
  <!-- 传统印框：暖纸色内描边 -->
  <rect x="12.5" y="12.5" width="75" height="75" rx="14" fill="none" stroke="#FBF7EF" stroke-opacity="0.55" stroke-width="2.4"/>
  <!-- 衬线「思」：思维 / 思考，博客之魂 -->
  <text x="50" y="54" text-anchor="middle" dominant-baseline="central"
        font-family="'Songti SC','STSong','Noto Serif SC','SimSun',serif"
        font-weight="700" font-size="60" fill="#FBF7EF">思</text>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Zoom</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    .image-container {
      display: inline-block;
      margin: 10px;
    }
    .zoomed-image {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      background: white;
      padding: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      display: none;
    }
    .overlay.active {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const images = [
          { id: 'image1', src: 'https://pic.dmjnb.com/pic/cbea51521d791bfe2bf0993d19ba0e46' },
          { id: 'image2', src: 'https://wallpaperm.cmcm.com/dcf1a499b17a0ce4ff0ecc11bd2ff8dc.jpg' },
          { id: 'image3', src: 'https://fuss10.elemecdn.com/2/11/6535bcfb26e4c79b48ddde44f4b6fjpeg.jpeg' }
        ];

        const zoomedImage = ref(null);
        const overlayActive = ref(false);

        const zoomImage = (image) => {
          zoomedImage.value = image;
          overlayActive.value = true;
        };

        const closeZoom = () => {
          zoomedImage.value = null;
          overlayActive.value = false;
        };

        return {
          images,
          zoomedImage,
          overlayActive,
          zoomImage,
          closeZoom
        };
      },
      template: `
        <div>
          <div v-for="image in images" :key="image.id" class="image-container">
            <img :id="image.id" :src="image.src" @click="zoomImage(image)" />
          </div>
          <div class="overlay" :class="{ active: overlayActive }" @click="closeZoom"></div>
          <div v-if="zoomedImage" class="zoomed-image"  @click="closeZoom">
            <img :src="zoomedImage.src" />
          </div>
        </div>
      `
    }).mount('#app');
  </script>
</body>
</html>
